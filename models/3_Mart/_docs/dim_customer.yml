version: 2

models:
  - name: dim_customer
    description: "Customer dimension model with customer attributes and geographic hierarchy."
    columns:
      - name: customer_key
        description: "Unique customer identifier."
      - name: customer_name
        description: "Customer name."
      - name: market_segment
        description: "Customer market segment."
      - name: account_balance
        description: "Current account balance for the customer."
      - name: nation_name
        description: "Name of the customer's nation."
      - name: region_name
        description: "Name of the customer's region."
