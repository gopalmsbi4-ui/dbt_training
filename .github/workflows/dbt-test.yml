name: dbt Tests and Validation

on:
  pull_request:
    paths:
      - 'models/**'
      - 'tests/**'
      - 'seeds/**'
      - 'macros/**'
      - 'dbt_project.yml'
  push:

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dbt and dependencies
        run: |
          pip install dbt-snowflake
          pip install dbt-utils
      
      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          # Note: You'll need to set up dbt profiles through GitHub secrets
          # For now, this is a placeholder
      
      - name: dbt parse
        run: dbt parse
        continue-on-error: true
      
      - name: dbt test (schema tests only)
        run: dbt test --select state:modified+ --state ./target
        continue-on-error: true
      
      - name: dbt compile
        run: dbt compile --select state:modified+
        continue-on-error: true
      
      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: target/
